name: CI Pipeline

on:
  push:
    branches: [main]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t api-demo .

  test:

    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run PHP syntax check
        run: php -l index.php

  docker-compose-test:

    runs-on: ubuntu-latest
    needs: test

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build containers
        run: docker compose build